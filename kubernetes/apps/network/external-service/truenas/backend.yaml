---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/backend_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: truenas
  namespace: network
spec:
  appProtocols:
    - gateway.envoyproxy.io/wss
  endpoints:
    - ip:
        address: 192.168.200.10
        port: 443
  tls:
    insecureSkipVerify: true
    alpnProtocols:
      - http/1.1
