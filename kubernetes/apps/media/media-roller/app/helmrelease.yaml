---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app media-roller
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    controllers:
      media-roller:
        containers:
          app:
            image:
              repository: "ghcr.io/rroller/media-roller"
              tag: "latest@sha256:6568bb3ceebc5701660bccefa056fc441a38becf851999616477b6e726ca6f90"
            command:
              - /bin/sh
              - -c
            args:
              - |
                while true; do
                  find /download -mindepth 1 -mmin +15 -type f -exec fuser -s {} \; -o -exec rm -rf {} +;
                  sleep 600;
                done &
                exec /app/media-roller
            env:
              TZ: ${TIMEZONE}
              MR_PROXY: "socks5://qbittorrent-gluetun.media.svc.cluster.local:8388"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 500Mi
              limits:
                memory: 15Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000

    route:
      app:
        hostnames:
          - "dl.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network

    persistence:
      download:
        type: emptyDir
        medium: Memory
