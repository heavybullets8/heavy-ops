# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app docmost-bhb
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    controllers:
      docmost-bhb:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18

        containers:
          app:
            image:
              repository: ghcr.io/ahinko/docmost
              tag: 0.24.1@sha256:2d0fc56829ce28991618757a780c1166922b088783680fe759b9ff09ef8194ef

            env:
              # General
              TZ: ${TIMEZONE}
              APP_URL: https://notes.bighornbyte.com
              FILE_UPLOAD_SIZE_LIMIT: 200mb
              # Redis
              REDIS_URL: "redis://dragonfly.database.svc.cluster.local:6379/4"
              #Email
              MAIL_DRIVER: smtp
              SMTP_HOST: smtp.migadu.com
              SMTP_PORT: 465
              SMTP_SECURE: true
              MAIL_FROM_ADDRESS: support@bighornbyte.com
              MAIL_FROM_NAME: BHB-Docs

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 4096Mi

            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        defaultContainerOptions:
          envFrom:
            - secretRef:
                name: docmost-bhb-secret

    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000

    route:
      app:
        annotations:
          # Skip external-dns processing on this HTTPRoute - the CNAME for
          # notes.bighornbyte.com is managed by the DNSEndpoint in dnsendpoint.yaml
          # because external-dns ignores HTTPRoute-level target overrides.
          external-dns.alpha.kubernetes.io/controller: none
        hostnames:
          - notes.bighornbyte.com
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https-bighornbyte

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /app/data/storage
