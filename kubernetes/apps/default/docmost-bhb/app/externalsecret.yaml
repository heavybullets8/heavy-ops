---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docmost-bhb-secret
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: docmost-bhb-secret
    creationPolicy: Owner
    template:
      data:
        APP_SECRET: "{{ .DOCMOST_BHB_APP_SECRET }}"

        DATABASE_URL: "postgresql://{{ .DOCMOST_BHB_POSTGRES_USER }}:{{ .DOCMOST_BHB_POSTGRES_PASS }}@postgres16-rw.database.svc.cluster.local:5432/docmostbhb?schema=public"
        INIT_POSTGRES_DBNAME: docmostbhb
        INIT_POSTGRES_HOST: postgres16-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .DOCMOST_BHB_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .DOCMOST_BHB_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .CNPG_SUPER_PASS }}"

        SMTP_USERNAME: "{{ .SMTP_BHB_USER }}"
        SMTP_PASSWORD: "{{ .SMTP_BHB_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
      rewrite:
        - regexp:
            source: "(.*)"
            target: "CNPG_$1"

    - extract:
        key: docmost-bighornbyte
      rewrite:
        - regexp:
            source: "(.*)"
            target: "DOCMOST_BHB_$1"

    - extract:
        key: smtp
      rewrite:
        - regexp:
            source: "(.*)"
            target: "SMTP_$1"
