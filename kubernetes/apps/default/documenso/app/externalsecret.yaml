---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: documenso-secret
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: documenso-secret
    creationPolicy: Owner
    template:
      data:
        # App secrets
        NEXTAUTH_SECRET: "{{ .DOCUMENSO_NEXTAUTH_SECRET }}"
        NEXT_PRIVATE_ENCRYPTION_KEY: "{{ .DOCUMENSO_ENCRYPTION_KEY }}"
        NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: "{{ .DOCUMENSO_ENCRYPTION_SECONDARY_KEY }}"

        # Database
        NEXT_PRIVATE_DATABASE_URL: "postgresql://{{ .DOCUMENSO_POSTGRES_USER }}:{{ .DOCUMENSO_POSTGRES_PASS }}@postgres16-rw.database.svc.cluster.local:5432/documenso?schema=public"
        NEXT_PRIVATE_DIRECT_DATABASE_URL: "postgresql://{{ .DOCUMENSO_POSTGRES_USER }}:{{ .DOCUMENSO_POSTGRES_PASS }}@postgres16-rw.database.svc.cluster.local:5432/documenso?schema=public"

        # postgres-init initContainer vars
        INIT_POSTGRES_DBNAME: documenso
        INIT_POSTGRES_HOST: postgres16-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .DOCUMENSO_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .DOCUMENSO_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .CNPG_SUPER_PASS }}"

        # Signing cert passphrase
        NEXT_PRIVATE_SIGNING_PASSPHRASE: "{{ .DOCUMENSO_SIGNING_PASSPHRASE }}"

        # SMTP
        NEXT_PRIVATE_SMTP_USERNAME: "{{ .SMTP_BHB_USER }}"
        NEXT_PRIVATE_SMTP_PASSWORD: "{{ .SMTP_BHB_PASS }}"

        # AI / Vertex (Gemini) — recipient & field detection
        GOOGLE_VERTEX_PROJECT_ID: "{{ .DOCUMENSO_VERTEX_PROJECT_ID }}"
        GOOGLE_VERTEX_API_KEY: "{{ .DOCUMENSO_VERTEX_API_KEY }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
      rewrite:
        - regexp:
            source: "(.*)"
            target: "CNPG_$1"

    - extract:
        key: documenso
      rewrite:
        - regexp:
            source: "(.*)"
            target: "DOCUMENSO_$1"

    - extract:
        key: smtp
      rewrite:
        - regexp:
            source: "(.*)"
            target: "SMTP_$1"
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: documenso-cert
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: documenso-cert
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        cert.p12: "{{ .CERT_P12_B64 | b64dec }}"
  dataFrom:
    - extract:
        key: documenso
