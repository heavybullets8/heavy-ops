# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app documenso
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    controllers:
      documenso:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18

        containers:
          app:
            image:
              repository: ghcr.io/documenso/documenso
              tag: v2.10.0@sha256:3f80cc23469960fb68b1c1a3d15ea72f2e8ebcecf66431ab774aea1faf0cecd7

            env:
              TZ: ${TIMEZONE}
              PORT: &port 3000
              NEXT_PUBLIC_WEBAPP_URL: https://sign.bighornbyte.com
              NEXT_PRIVATE_INTERNAL_WEBAPP_URL: http://localhost:3000
              NEXT_PUBLIC_DISABLE_SIGNUP: "true"

              NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH: /opt/documenso/cert.p12

              # SMTP
              NEXT_PRIVATE_SMTP_TRANSPORT: smtp-auth
              NEXT_PRIVATE_SMTP_HOST: smtp.migadu.com
              NEXT_PRIVATE_SMTP_PORT: 465
              NEXT_PRIVATE_SMTP_SECURE: true
              NEXT_PRIVATE_SMTP_FROM_NAME: Documenso
              NEXT_PRIVATE_SMTP_FROM_ADDRESS: sign@bighornbyte.com

            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  failureThreshold: 60
                  periodSeconds: 5

        pod:
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            runAsNonRoot: true
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch

        defaultContainerOptions:
          envFrom:
            - secretRef:
                name: documenso-secret

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          # Skip external-dns processing on this HTTPRoute - the CNAME for
          # sign.bighornbyte.com is managed by the DNSEndpoint in dnsendpoint.yaml
          # because external-dns ignores HTTPRoute-level target overrides.
          external-dns.alpha.kubernetes.io/controller: none
        hostnames:
          - sign.bighornbyte.com
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https-bighornbyte

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /app/data

      cert:
        type: secret
        name: documenso-cert
        globalMounts:
          - path: /opt/documenso/cert.p12
            subPath: cert.p12
            readOnly: true
