---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app fcc-spam-reporter
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    controllers:
      fcc-spam-reporter:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/heavybullets8/fcc-spam-reporter
              tag: latest@sha256:02acfb11ff59496c3764db2c2b40dd4845969b9717aeec4df9013d317aafc77c
              pullPolicy: IfNotPresent

            env:
              TZ: ${TIMEZONE}
              HOST: 0.0.0.0
              PORT: &port 8080
              LOG_LEVEL: debug
              DATA_DIR: /app/data
              FLARESOLVERR_URL: http://flaresolverr.media.svc.cluster.local:8191/v1
              SUBMIT: true
              FCC_ADMIN_TOKEN: ""
            envFrom:
              - secretRef:
                  name: fcc-spam-reporter-secret

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 5

            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi

            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "fcc-spam-reporter.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network

    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /app/data

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

      dshm:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /dev/shm
