---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nextcloud
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  hostnames:
    - "cloud.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-external
      namespace: network
  rules:
    # --- .well-known 301 redirects (carddav/caldav) ---
    - matches:
        - path: { type: Exact, value: /.well-known/carddav }
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /remote.php/dav
            statusCode: 301
    - matches:
        - path: { type: Exact, value: /.well-known/caldav }
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /remote.php/dav
            statusCode: 301

    # --- .well-known URL rewrites (federation / discovery) ---
    - matches:
        - path: { type: Exact, value: /.well-known/webfinger }
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /index.php/.well-known/webfinger
      backendRefs:
        - name: nextcloud
          port: 8080
    - matches:
        - path: { type: Exact, value: /.well-known/nodeinfo }
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /index.php/.well-known/nodeinfo
      backendRefs:
        - name: nextcloud
          port: 8080
    - matches:
        - path: { type: Exact, value: /.well-known/host-meta }
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /public.php?service=host-meta
      backendRefs:
        - name: nextcloud
          port: 8080
    - matches:
        - path: { type: Exact, value: /.well-known/host-meta.json }
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /public.php?service=host-meta-json
      backendRefs:
        - name: nextcloud
          port: 8080

    # --- default ---
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: nextcloud
          port: 8080
