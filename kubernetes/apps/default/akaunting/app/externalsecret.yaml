---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akaunting-secret
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: akaunting-secret
    creationPolicy: Owner
    template:
      data:
        DB_CONNECTION: pgsql
        DB_HOST: &dbHost postgres16-rw.database.svc.cluster.local
        DB_PORT: "5432"
        DB_NAME: &dbName akaunting
        DB_USERNAME: &dbUser "{{ .AKAUNTING_POSTGRES_USER }}"
        DB_PASSWORD: &dbPass "{{ .AKAUNTING_POSTGRES_PASS }}"
        DB_DATABASE: *dbName

        INIT_POSTGRES_DBNAME: *dbName
        INIT_POSTGRES_HOST: *dbHost
        INIT_POSTGRES_USER: *dbUser
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_SUPER_PASS: "{{ .CNPG_SUPER_PASS }}"

        APP_URL: "https://sales.${SECRET_DOMAIN}"
        LOCALE: "en-US"
        COMPANY_NAME: "Bighorn Byte LLC"
        COMPANY_EMAIL: "info@${SECRET_DOMAIN}"
        ADMIN_EMAIL: "{{ .SMTP_BHB_USER }}"
        ADMIN_PASSWORD: "{{ .SMTP_BHB_PASS }}"

  dataFrom:
    - extract:
        key: cloudnative-pg
      rewrite:
        - regexp:
            source: "(.*)"
            target: "CNPG_$1"

    - extract:
        key: akaunting
      rewrite:
        - regexp:
            source: "(.*)"
            target: "AKAUNTING_$1"

    - extract:
        key: smtp
      rewrite:
        - regexp:
            source: "(.*)"
            target: "SMTP_$1"
