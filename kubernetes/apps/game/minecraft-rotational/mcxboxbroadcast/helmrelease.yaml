---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mcxboxbroadcast-rotational
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        runAsNonRoot: true
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      mcxboxbroadcast-rotational:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/mcxboxbroadcast/standalone
              tag: latest@sha256:6c99122210a1dc0325bdf0d29a1aec1d8f93b4b2e7b9311527a9667542629c41
            command: ["/bin/sh", "-c", "java -jar /opt/app/MCXboxBroadcastStandalone.jar 2>&1 | tee /tmp/app.log"]
            env:
              TZ: ${TIMEZONE}
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - find /tmp/app.log -mmin -5 | grep -q .
                  initialDelaySeconds: 300
                  periodSeconds: 60
                  failureThreshold: 3
            resources:
              limits:
                cpu: 500m
                memory: 1Gi
              requests:
                cpu: 10m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            lifecycle:
              postStart:
                exec:
                  command: ["/bin/sh", "-c", "cp /config-template/config.yml /opt/app/config/config.yml"]

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /opt/app/config

      config-file:
        type: configMap
        name: mcxboxbroadcast-rotational-configmap
        globalMounts:
          - path: /config-template/config.yml
            subPath: config.yml
            readOnly: true

      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
