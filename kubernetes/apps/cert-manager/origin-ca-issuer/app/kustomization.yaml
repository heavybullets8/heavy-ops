---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# CRDs vendored from cloudflare/origin-ca-issuer v0.14.0 because the upstream
# Helm chart does not ship them. Keep in sync with the controller image tag
# in helmrelease.yaml when bumping.
resources:
  - ./crds/clusteroriginissuer.yaml
  - ./crds/originissuer.yaml
  - ./ocirepository.yaml
  - ./helmrelease.yaml
