---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: konflate
  values:
    config:
      repo: github://heavybullets8/heavy-ops
      statusChecks: true
      prComments: true
      publicUrl: https://konflate.${SECRET_DOMAIN}
      mcp: true
      verifyImages: true
    secret:
      existingSecret: konflate-secret
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - konflate.${SECRET_DOMAIN}
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
